name: deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

# Branch ⇒ env mapping:
#   push to main    → prod
#   push to develop → dev
#   workflow_dispatch → user-chosen (default staging)
# Computed once and reused via env.ENVIRONMENT below; environment: must repeat
# the same expression because env.* isn't available in `environment:`.
concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod') || (github.ref_name == 'develop' && 'dev') || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod') || (github.ref_name == 'develop' && 'dev') || 'staging' }}

    env:
      TF_IN_AUTOMATION: "1"
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod') || (github.ref_name == 'develop' && 'dev') || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        env:
          REGION: ${{ vars.GCP_REGION }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Compute image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: echo "tag=${SHA::12}" >>"$GITHUB_OUTPUT"

      - name: Build and push image
        id: image
        env:
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REPO: andela-mcp-${{ env.ENVIRONMENT }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/andela-mcp:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >>"$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        working-directory: infra/terraform
        env:
          STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="prefix=andela-mcp/${ENVIRONMENT}"

      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_image: ${{ steps.image.outputs.image }}
        # CI only rolls the Cloud Run service forward to the new image.
        # Bootstrap-time resources (WIF, SAs, APIs, IAM bindings, Artifact
        # Registry) are managed by the local `make tf-up` flow with owner
        # credentials. The deployer SA intentionally doesn't have project-
        # wide read access, so we skip refresh entirely (-refresh=false) and
        # narrowly target the Cloud Run service.
        run: |
          terraform apply -auto-approve \
            -refresh=false \
            -var-file="envs/${ENVIRONMENT}.tfvars.example" \
            -target=google_cloud_run_v2_service.app
